name: 前端检查

on:
  push:
    branches: [develop]
    paths:
      - 'frontend_vue/**'
      - '.github/workflows/build-frontend.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'frontend_vue/**'
      - '.github/workflows/build-frontend.yml'
  workflow_dispatch:

jobs:
  lint-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 检查路径变化
      uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          frontend:
            - 'frontend_vue/**'

    - name: 安装 pnpm
      if: steps.changes.outputs.frontend == 'true'
      uses: pnpm/action-setup@v4
      with:
        version: 11

    - name: 设置 Node.js
      if: steps.changes.outputs.frontend == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: 'frontend_vue/pnpm-lock.yaml'

    - name: 安装前端依赖
      if: steps.changes.outputs.frontend == 'true'
      working-directory: ./frontend_vue
      run: pnpm install

    - name: 构建前端项目
      if: steps.changes.outputs.frontend == 'true'
      working-directory: ./frontend_vue
      run: pnpm build
