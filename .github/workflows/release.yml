# LingChat 发布工作流
#
# 当推送版本标签 (v*) 时:
# 1. 为 Windows / macOS / Linux 构建 Tauri 应用（包含游戏资源）
# 2. 创建 GitHub Release 草稿，上传所有产物
#
# 游戏资源通过 Tauri bundle.resources 打包进安装程序。
# 构建时运行 generate-data-manifest.js 生成 data_manifest.json。
#
# 需要的 GitHub Secrets:
#   - TAURI_SIGNING_PRIVATE_KEY        (tauri signer generate 生成的私钥)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD (私钥密码)

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  DATA_VERSION: ${{ github.run_number }}

permissions:
  contents: write

jobs:
  # ─── 构建 Windows Tauri 应用 ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装前端依赖
        run: pnpm install

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DATA_VERSION: ${{ env.DATA_VERSION }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LingChat ${{ github.ref_name }}'
          releaseBody: |
            ## 更新内容

            请查看 [CHANGELOG](https://github.com/SlimeBoyOwO/LingChat/blob/main/CHANGELOG.md) 了解详情。

            ## 安装

            下载下方的安装程序，安装即玩（游戏资源已包含在安装包中）。
            - `ling-chat_*_x64-setup.exe` — NSIS 安装程序（推荐）
          includeUpdaterJson: true
          releaseDraft: true
          prerelease: false

  # ─── 构建 macOS Tauri 应用 ─────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装前端依赖
        run: pnpm install

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DATA_VERSION: ${{ env.DATA_VERSION }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LingChat ${{ github.ref_name }}'
          includeUpdaterJson: true
          releaseDraft: true
          prerelease: false

  # ─── 发布 Release ─────────────────────────────────────────
  #
  # 等所有平台构建完成后，将草稿 Release 公开发布。
  # 发布后 latest.json 才能通过 releases/latest/download/ 访问。
  publish-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 发布 Release
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 构建 Linux Tauri 应用 ─────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装前端依赖
        run: pnpm install

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpipewire-0.3-dev libgbm-dev libxdo-dev libxcb-shape0-dev libxcb-xfixes0-dev libasound2-dev libssl-dev

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DATA_VERSION: ${{ env.DATA_VERSION }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LingChat ${{ github.ref_name }}'
          includeUpdaterJson: true
          releaseDraft: true
          prerelease: false
