name: 打包发行版

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      data_version:
        description: '数据版本号（整数）'
        required: false
        default: '1'

env:
  DATA_VERSION: ${{ github.event.inputs.data_version || github.run_number }}

permissions:
  contents: write

jobs:
  generate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 拉取 LFS 游戏资源 (仅 data/game_data/)
        run: git lfs pull --include="data/game_data/**"

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 生成 data_manifest.json
        run: node scripts/generate-data-manifest.js --data-version ${{ env.DATA_VERSION }}

      - name: 打包 data_files.zip
        run: |
          if [ -d data/game_data ]; then
            cd data
            zip -r ../data_files.zip game_data/ -x "game_data/screenshots/*" "game_data/voice/*" "game_data/.trash/*" "*.db" "*.backup.db"
            cd ..
          else
            echo "⚠ 未找到 data/game_data/ 目录，将创建空 zip"
            touch empty.txt
            zip data_files.zip empty.txt
            rm empty.txt
          fi

      - name: 上传 data 产物
        uses: actions/upload-artifact@v4
        with:
          name: data-artifacts
          path: |
            data_manifest.json
            data_files.zip

  build:
    needs: generate-data
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-amd64
            os: windows-latest
            target: ''
          - platform: macos
            os: macos-latest
            target: ''
          - platform: linux-arm64
            os: ubuntu-latest
            target: ''
          - platform: linux-aarch64
            os: ubuntu-24.04-arm
            target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: 拉取 LFS 应用资源 (仅 public/ + src/assets/ + icons)
        run: git lfs pull --include="public/**,src/assets/**,src-tauri/icons/**"

      # 下载 data 产物，如有需要可以复制到构建目录
      - uses: actions/download-artifact@v4
        with:
          name: data-artifacts

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'
      
      - name: 设置 pnpm store 缓存
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 安装前端依赖
        run: |
          pnpm i
          pnpm run init

      - name: 安装系统依赖 (仅 Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install eatmydata
          sudo eatmydata apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpipewire-0.3-dev libgbm-dev libxdo-dev libxcb-shape0-dev libxcb-xfixes0-dev libasound2-dev libssl-dev mold zip mold

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 设置 rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
              ./src-tauri
          cache-targets: true
          shared-key: ${{ runner.os }}-${{ runner.arch }}-main-pnpm-tauri-build-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v1
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-arg=-fuse-ld=mold' || '' }}
        with:
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: '${{ matrix.platform }}-build'
          args: ${{ matrix.target }}

  release:
    needs: [generate-data, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 下载 data 产物
      - uses: actions/download-artifact@v4
        with:
          name: data-artifacts
          path: artifacts/data

      # 下载各平台的构建产物
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
          path: artifacts/builds
          merge-multiple: true

      - name: 显示产物结构
        run: ls -R artifacts

      - name: 创建 GitHub Release 并上传所有文件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'LingChat ${{ github.ref_name }}'
          body: |
            ## 更新内容

            请查看 [CHANGELOG](https://github.com/SlimeBoyOwO/LingChat/blob/main/CHANGELOG.md) 了解详情。

            ## 安装

            请根据你的平台下载对应的安装包。
            - Windows: `.exe`
            - macOS: `.dmg`
            - Linux: `.AppImage` / `.deb`

            ## 数据资源

            如需手动更新游戏资源，请下载 `data_files.zip` 并解压到程序目录下的 `data/` 文件夹。
          draft: true
          prerelease: false
          files: |
            artifacts/data/*
            artifacts/builds/**